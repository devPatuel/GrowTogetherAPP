name: growtogetherapp
description: "GrowTogether - Social Habit Tracker"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  provider: ^6.1.2
  go_router: ^14.2.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  confetti: ^0.7.0
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  growtogether_data:
    git:
      url: https://github.com/devPatuel/GrowTogetherDATA.git
      ref: v0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
