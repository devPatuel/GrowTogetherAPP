name: growtogetherapp
description: "GrowTogether - Social Habit Tracker"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  provider: ^6.1.2
  go_router: ^14.2.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  confetti: ^0.7.0
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  growtogether_data:
    git:
      url: https://github.com/devPatuel/GrowTogetherDATA.git
      ref: v0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/branding/logo_square.png"
  android_12:
    image: "assets/branding/logo_square.png"
    color: "#FFFFFF"
  web: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/branding/logo_square.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/logo_square.png"
  web:
    generate: true
    image_path: "assets/branding/logo_square.png"
    background_color: "#FFFFFF"
    theme_color: "#2E7D32"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
